services:
  - type: web
    name: sales-crm-api
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      # MongoDB Atlas Connection (from environment)
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: ai_sales_db
      # API Keys
      - key: GROQ_API_KEY
        sync: false
      # Email Configuration
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: '587'
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      # CRM Integration
      - key: USE_CRM
        value: 'false'

  - type: static
    name: sales-crm-frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sales-crm-api.onrender.com
